<section id="contact">
  <div class="reveal" style="margin-bottom: 3rem">
    <span class="section-tag">Get In Touch</span>
    <h2 class="section-title">Let's Work Together</h2>
    <p class="section-subtitle">
      Have a project in mind or want to chat about opportunities? My inbox is always open.
    </p>
  </div>

  <div class="contact__grid">
    <!-- Contact info -->
    <div class="reveal">
      <div class="contact__info-item">
        <div class="contact__info-icon">📧</div>
        <div>
          <div class="contact__info-label">Email</div>
          <div class="contact__info-value">alex.chen@dev.io</div>
        </div>
      </div>
      <div class="contact__info-item">
        <div class="contact__info-icon">📍</div>
        <div>
          <div class="contact__info-label">Location</div>
          <div class="contact__info-value">San Francisco, CA — Open to remote</div>
        </div>
      </div>
      <div class="contact__info-item">
        <div class="contact__info-icon">⏰</div>
        <div>
          <div class="contact__info-label">Availability</div>
          <div class="contact__info-value">Available for freelance &amp; full-time</div>
        </div>
      </div>

      <div class="contact__social">
        <a class="social-btn" href="#" aria-label="GitHub">

            />
          </svg>
        </a>
        <a class="social-btn" href="#" aria-label="LinkedIn">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"

          </svg>
        </a>
        <a class="social-btn" href="#" aria-label="Twitter/X">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
            />
          </svg>
        </a>
        <a class="social-btn" href="#" aria-label="Dev.to">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M7.42 10.05c-.18-.16-.46-.23-.84-.23H6l.02 2.44.04 2.45.56-.02c.41 0 .63-.07.83-.26.24-.24.26-.36.26-2.2 0-1.91-.02-1.96-.29-2.18zM0 4.94v14.12h24V4.94H0zM8.56 15.3c-.44.58-1.06.77-2.53.77H4.71V8.53h1.4c1.67 0 2.16.18 2.6.9.27.43.29.6.32 2.57.05 2.23-.02 2.73-.47 3.3zm5.09-5.47h-2.47v1.77h1.52v1.28l-.72.04-.75.03v1.77l1.22.03 1.2.04v1.28h-1.6c-1.53 0-1.6-.01-1.87-.3l-.3-.28v-3.16c0-3.02.01-3.18.25-3.48.23-.31.25-.31 1.88-.31h1.64v1.29zm4.68 5.45c-.17.43-.64.79-1 .79-.18 0-.45-.15-.67-.39-.32-.32-.45-.63-.82-2.08l-.9-3.39-.45-1.67h.76c.4 0 .75.02.75.05 0 .06 1.16 4.54 1.26 4.83.04.15.32-.7.73-2.3l.66-2.52.74-.04c.4-.02.73 0 .73.04 0 .14-1.67 6.38-1.8 6.68z"
            />
          </svg>
        </a>
      </div>
    </div>

    <!-- Contact form -->
    <div class="reveal reveal--delay-1">
      <div class="contact__form">
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">First Name</label>
            <input class="form-input" type="text" placeholder="John" />
          </div>
          <div class="form-field">
            <label class="form-label">Last Name</label>
            <input class="form-input" type="text" placeholder="Doe" />
          </div>
        </div>
        <div class="form-field">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" placeholder="john@example.com" />
        </div>
        <div class="form-field">
          <label class="form-label">Subject</label>
          <input class="form-input" type="text" placeholder="Project inquiry..." />
        </div>
        <div class="form-field">
          <label class="form-label">Message</label>
          <textarea
            class="form-textarea"
            placeholder="Tell me about your project, timeline, and budget..."
          ></textarea>
        </div>
        <button
          class="btn-primary"
          style="align-self: flex-start"
          onclick="this.textContent='Sending…';setTimeout(()=>this.textContent='Message Sent ✓',1500)"
        >
          <svg
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
          Send Message
        </button>
      </div>
    </div>
  </div>
</section>
