<!-- hero.component.html -->
<section id="hero" class="relative min-h-screen flex items-center justify-center 
         bg-gradient-to-br from-gray-950 via-gray-900 to-black 
         text-white overflow-hidden px-4 sm:px-6">

  <!-- Background Glow Effects -->
  <div class="absolute top-0 left-0 w-48 h-48 sm:w-72 sm:h-72 bg-indigo-500/20 rounded-full blur-3xl"></div>
  <div class="absolute bottom-0 right-0 w-48 h-48 sm:w-72 sm:h-72 bg-cyan-500/20 rounded-full blur-3xl"></div>

  <!-- Animated Background Layers -->
  <div class="absolute inset-0 z-0 pointer-events-none" aria-hidden="true">
    <div class="bg-animated-1"></div>
    <div class="bg-animated-2"></div>
  </div>

  <!-- Dot grid overlay -->
  <div class="absolute inset-0 z-0 pointer-events-none dot-grid"></div>

  <div class="relative z-10 max-w-4xl w-full text-center py-10 sm:py-0">

    <!-- Glassy card -->
    <div class="relative rounded-2xl sm:rounded-3xl px-4 py-10 sm:px-10 sm:py-14 md:px-14 hero-card backdrop-blur-sm">

      <!-- Top edge glow line -->
      <div class="absolute top-0 left-[15%] right-[15%] h-px rounded-full edge-glow-top"></div>

      <!-- Status badge -->
      <!-- <div class="flex justify-center mb-6 sm:mb-8">
        <span class="inline-flex items-center gap-2 px-3 sm:px-4 py-1 sm:py-1.5 rounded-full
                     bg-emerald-500/10 border border-emerald-500/20
                     text-emerald-400 text-[10px] sm:text-xs font-semibold tracking-widest uppercase">
          <span class="relative flex h-2 w-2 shrink-0">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
          </span>
          Available for work
        </span>
      </div> -->

      <!-- Profile Image -->
      <div class="relative inline-flex items-center justify-center mb-8 sm:mb-10">

        <!-- Spinning orbit ring -->
        <div class="absolute w-40 h-40 sm:w-52 sm:h-52 md:w-64 md:h-64 rounded-full orbit-ring animate-spin-slow"></div>

        <!-- Animated Gradient Glow Ring -->
        <div class="absolute w-36 h-36 sm:w-44 sm:h-44 md:w-60 md:h-60
              bg-gradient-to-r from-indigo-500 to-cyan-500
              rounded-full blur-3xl opacity-25
              animate-pulse">
        </div>

        <!-- Profile Image -->
        <img src="assets/profile-picture.jpg" alt="Profile picture"
             class="relative rounded-full object-cover
                    border-4 border-white/10
                    shadow-2xl ring-2 ring-indigo-500/30
                    transition-transform duration-500
                    hover:scale-105
                    hover:shadow-indigo-500/30
                    profile-img" />
      </div>

      <!-- Greeting -->
      <p class="mb-3 sm:mb-4 text-2xl sm:text-3xl md:text-4xl font-bold text-sky-400 tracking-wide animate-fade-in-down">
        <span class="inline-block wave">👋</span>
        {{ greeting }}
      </p>

      <!-- Name -->
      <div class="relative inline-block mb-2 max-w-full">
        <h1 class="text-3xl sm:text-5xl md:text-6xl font-extrabold tracking-tight
                   bg-gradient-to-r from-white to-gray-300
                   bg-clip-text text-transparent animate-pop
                   leading-tight break-words">
          Butch D. Cañada
        </h1>
        <span class="absolute -bottom-1 left-0 right-0 h-[3px] rounded-full name-underline"></span>
      </div>

      <!-- Title -->
      <p class="text-sm sm:text-lg md:text-2xl text-gray-300 mb-4 font-medium mt-4 leading-snug">
        Full-Stack Software Engineer
        <span class="hidden sm:inline text-sky-400/40 mx-1">|</span>
        <br class="sm:hidden" />
        AI &amp; Web3 Specialist
      </p>

      <!-- Tagline -->
      <p class="max-w-2xl mx-auto text-gray-400 text-sm sm:text-base md:text-lg leading-relaxed mb-8 sm:mb-10 animate-fade-in-up">
        Building scalable, secure systems powered by AI, Web, and Mobile technologies —
        architected for performance, innovation, and long-term business growth.
      </p>

      <!-- CTA Buttons -->
      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center">

        <a href="#projects"
           class="relative overflow-hidden px-6 sm:px-8 py-3 rounded-full
                  bg-gradient-to-r from-indigo-500 to-cyan-500
                  hover:from-indigo-400 hover:to-cyan-400
                  font-semibold shadow-lg text-sm sm:text-base
                  hover:-translate-y-1 hover:shadow-indigo-400/40
                  transition-all duration-300 group">
          <span class="absolute inset-0 -translate-x-full group-hover:translate-x-full
                       transition-transform duration-700
                       bg-gradient-to-r from-transparent via-white/20 to-transparent">
          </span>
          View Projects
        </a>

        <a href="#contact"
           class="px-6 sm:px-8 py-3 rounded-full
                  border border-white/20
                  hover:bg-white/10 hover:border-sky-400/30 hover:-translate-y-1
                  transition-all duration-300 font-semibold text-sm sm:text-base">
          Contact Me
        </a>

      </div>

      <!-- Bottom edge line -->
      <div class="absolute bottom-0 left-[15%] right-[15%] h-px rounded-full edge-glow-bottom"></div>

    </div>

  </div>
</section>
